<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">My Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="container header-inner">
      <a class="logo" id="store-logo" href="index.html">My <span>Store</span></a>
      <a class="cart-btn" href="cart.html" id="cart-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Cart
        <span class="badge" id="cart-count">0</span>
      </a>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="container">
      <h1 id="hero-title">Welcome to My Store</h1>
      <p id="hero-tagline">Quality items, great prices</p>
    </div>
  </section>

  <!-- ===== SEARCH + FILTERS ===== -->
  <section class="controls">
    <div class="container controls-inner">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search products…" autocomplete="off" />
      </div>
      <div class="filter-tabs" id="filterTabs">
        <!-- Tabs injected by JS -->
      </div>
      <select id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="name-asc">Name: A → Z</option>
      </select>
    </div>
  </section>

  <!-- ===== PRODUCT GRID ===== -->
  <main class="grid-section">
    <div class="container">
      <div class="results-bar">
        <span id="resultsCount"></span>
      </div>
      <div class="product-grid" id="productGrid">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== PRODUCT DETAIL VIEW ===== -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-page">
      <button class="detail-back" onclick="closeDetail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver al catálogo
      </button>
      <div class="detail-inner">
        <div class="detail-img-wrap">
          <img id="detailImg" src="" alt="" />
          <span class="condition-tag" id="detailCondition"></span>
        </div>
        <div class="detail-info">
          <span class="card-category" id="detailCategory"></span>
          <h1 class="detail-name" id="detailName"></h1>
          <p class="detail-desc" id="detailDesc"></p>
          <div class="detail-price-row">
            <span class="detail-price" id="detailPrice"></span>
            <div class="card-actions" id="detailActions"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BUY NOW MODAL ===== -->
  <div class="modal-overlay" id="buyModal" onclick="closeBuyModal(event)">
    <div class="modal">
      <div class="modal-header">
        <img id="modalImg" src="" alt="" />
        <div class="modal-header-info">
          <span class="cat" id="modalCat"></span>
          <h3 id="modalName"></h3>
          <span class="price" id="modalPrice"></span>
        </div>
        <button class="modal-close" onclick="closeBuyModalDirect()">&times;</button>
      </div>
      <div class="modal-body">
        <div>
          <div class="modal-section-title">Formas de pago</div>
          <div class="payment-options" id="modalPayments"></div>
        </div>
        <div class="modal-contact" id="modalContact"></div>
        <p class="modal-shipping" id="modalShipping"></p>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
