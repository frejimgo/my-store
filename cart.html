<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — My Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="container header-inner">
      <a class="logo" id="store-logo" href="index.html">My <span>Store</span></a>
      <a class="cart-btn" href="cart.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Cart
        <span class="badge" id="cart-count">0</span>
      </a>
    </div>
  </header>

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header">
    <div class="container">
      <a class="back-link" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Shop
      </a>
      <h1>Your Cart</h1>
    </div>
  </div>

  <!-- ===== CART LAYOUT ===== -->
  <main>
    <div class="container cart-layout">

      <!-- Cart items -->
      <div>
        <div class="cart-items-list" id="cartItemsList">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Order summary -->
      <aside>
        <div class="summary-card">
          <h2>Order Summary</h2>

          <div id="summaryRows">
            <!-- Injected by JS -->
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span id="summaryTotal">$0</span>
          </div>

          <!-- Contact info box -->
          <div class="contact-box" id="contactBox">
            <h3>How to Purchase</h3>
            <p><span class="label">Contact:</span> <span id="contactEmail"></span></p>
            <p><span class="label">Phone/Text:</span> <span id="contactPhone"></span></p>
            <p><span class="label">Location:</span> <span id="contactLocation"></span></p>
            <div class="payment-tags" id="paymentTags"></div>
            <p style="margin-top:.6rem; color: var(--muted); font-size:.8rem;">
              Send your cart list above and we'll confirm availability and arrange payment.
            </p>
          </div>

          <p class="shipping-note" id="shippingNote"></p>

          <button class="btn-clear" id="clearCartBtn" onclick="clearCart()">Clear Cart</button>
        </div>
      </aside>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== BUY NOW MODAL ===== -->
  <div class="modal-overlay" id="buyModal" onclick="closeBuyModal(event)">
    <div class="modal">
      <div class="modal-header">
        <img id="modalImg" src="" alt="" />
        <div class="modal-header-info">
          <span class="cat" id="modalCat"></span>
          <h3 id="modalName"></h3>
          <span class="price" id="modalPrice"></span>
        </div>
        <button class="modal-close" onclick="closeBuyModalDirect()">&times;</button>
      </div>
      <div class="modal-body">
        <div>
          <div class="modal-section-title">Formas de pago</div>
          <div class="payment-options" id="modalPayments"></div>
        </div>
        <div class="modal-contact" id="modalContact"></div>
        <p class="modal-shipping" id="modalShipping"></p>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
